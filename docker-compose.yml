# Synapse local stack.
# Run from repo root: docker compose up -d
#
# What you get:
#   postgres   — metadata DB for synapse (persisted in named volume)
#   synapse    — control-plane API on host port 8080
#   dashboard  — Next.js dashboard on host port 6790
#
# Synapse provisions Convex backend containers on the synapse-network,
# bound to host ports in the configured range (default 3210-3500).
# It needs access to the Docker socket on the host.

name: synapse

services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
    volumes:
      - synapse-pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - synapse-network

  synapse:
    build:
      context: ./synapse
      args:
        VERSION: ${SYNAPSE_VERSION:-dev}
    image: synapse:${SYNAPSE_VERSION:-dev}
    container_name: synapse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_HTTP_ADDR: 0.0.0.0:8080
      SYNAPSE_DB_URL: postgres://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD:-synapse}@postgres:5432/${POSTGRES_DB:-synapse}?sslmode=disable
      SYNAPSE_JWT_SECRET: ${SYNAPSE_JWT_SECRET}
      SYNAPSE_JWT_ACCESS_TTL: ${SYNAPSE_JWT_ACCESS_TTL:-15m}
      SYNAPSE_JWT_REFRESH_TTL: ${SYNAPSE_JWT_REFRESH_TTL:-720h}
      SYNAPSE_DOCKER_HOST: unix:///var/run/docker.sock
      SYNAPSE_BACKEND_IMAGE: ${SYNAPSE_BACKEND_IMAGE:-ghcr.io/get-convex/convex-backend:latest}
      SYNAPSE_DOCKER_NETWORK: synapse-network
      SYNAPSE_PORT_RANGE_MIN: ${SYNAPSE_PORT_RANGE_MIN:-3210}
      SYNAPSE_PORT_RANGE_MAX: ${SYNAPSE_PORT_RANGE_MAX:-3500}
      SYNAPSE_HEALTHCHECK_VIA_NETWORK: "true"
      # Mount /d/{name}/* on the API listener. Required for the proxy.spec.ts
      # e2e test; safe to leave on in dev — when off, /d/* simply 404s.
      SYNAPSE_PROXY_ENABLED: ${SYNAPSE_PROXY_ENABLED:-true}
      SYNAPSE_LOG_LEVEL: ${SYNAPSE_LOG_LEVEL:-info}
    volumes:
      # Synapse provisions sibling containers via the host docker daemon.
      # This mount is unavoidable for the v0 architecture; the alternative is
      # rootless docker-in-docker, which is out of scope.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${SYNAPSE_PORT:-8080}:8080"
    networks:
      - synapse-network

  dashboard:
    build:
      context: ./dashboard
    image: synapse-dashboard:${SYNAPSE_VERSION:-dev}
    container_name: synapse-dashboard
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      # The browser talks to Synapse via the host port mapping. If you put
      # a reverse proxy in front, override this to the public URL.
      NEXT_PUBLIC_SYNAPSE_URL: ${PUBLIC_SYNAPSE_URL:-http://localhost:8080}
    ports:
      - "${DASHBOARD_PORT:-6790}:3000"
    networks:
      - synapse-network

volumes:
  synapse-pgdata:

networks:
  synapse-network:
    name: synapse-network
    driver: bridge
