# Synapse local stack.
# Run from repo root: docker compose up -d
#
# What you get:
#   postgres   — metadata DB for synapse (persisted in named volume)
#   synapse    — control-plane API on host port 8080
#   dashboard  — Next.js dashboard on host port 6790
#
# Synapse provisions Convex backend containers on the synapse-network,
# bound to host ports in the configured range (default 3210-3500).
# It needs access to the Docker socket on the host.

name: synapse

services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
    volumes:
      - synapse-pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - synapse-network

  synapse:
    build:
      context: ./synapse
      args:
        VERSION: ${SYNAPSE_VERSION:-dev}
    # Tagged :local because SYNAPSE_VERSION is human-readable and may
    # contain characters Docker rejects in tags (e.g. `feat/foo`).
    # The version stamp lives in .env + the binary's compile-time
    # constant + .upgrade-snapshot.tsv (image_id) — the docker tag
    # itself doesn't need to track it.
    image: synapse:local
    container_name: synapse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_HTTP_ADDR: 0.0.0.0:8080
      SYNAPSE_DB_URL: postgres://${POSTGRES_USER:-synapse}:${POSTGRES_PASSWORD:-synapse}@postgres:5432/${POSTGRES_DB:-synapse}?sslmode=disable
      SYNAPSE_JWT_SECRET: ${SYNAPSE_JWT_SECRET}
      SYNAPSE_JWT_ACCESS_TTL: ${SYNAPSE_JWT_ACCESS_TTL:-15m}
      SYNAPSE_JWT_REFRESH_TTL: ${SYNAPSE_JWT_REFRESH_TTL:-720h}
      SYNAPSE_DOCKER_HOST: unix:///var/run/docker.sock
      SYNAPSE_BACKEND_IMAGE: ${SYNAPSE_BACKEND_IMAGE:-ghcr.io/get-convex/convex-backend:latest}
      SYNAPSE_DOCKER_NETWORK: synapse-network
      SYNAPSE_PORT_RANGE_MIN: ${SYNAPSE_PORT_RANGE_MIN:-3210}
      SYNAPSE_PORT_RANGE_MAX: ${SYNAPSE_PORT_RANGE_MAX:-3500}
      SYNAPSE_HEALTHCHECK_VIA_NETWORK: "true"
      # Mount /d/{name}/* on the API listener. Required for the proxy.spec.ts
      # e2e test; safe to leave on in dev — when off, /d/* simply 404s.
      SYNAPSE_PROXY_ENABLED: ${SYNAPSE_PROXY_ENABLED:-true}
      # SYNAPSE_PUBLIC_URL controls how /auth, /cli_credentials, and the
      # GET /v1/deployments/* handlers rewrite the deployment URL the
      # provisioner stored ("http://127.0.0.1:<port>") into something a
      # remote browser/CLI can reach. Without this passthrough the
      # backend has no way to know what hostname operators front it
      # with, and the dashboard/CLI render loopback URLs. Empty in
      # local dev (no rewrite); setup.sh sets it to "https://<domain>"
      # or "http://<public-ip>:<port>" depending on --no-tls.
      SYNAPSE_PUBLIC_URL: ${SYNAPSE_PUBLIC_URL:-}
      # CORS — locked to the dashboard origin in production. Defaults
      # to "*" for local dev so a browser opened against an arbitrary
      # IP/port can still call the API.
      SYNAPSE_ALLOWED_ORIGINS: ${SYNAPSE_ALLOWED_ORIGINS:-*}
      SYNAPSE_LOG_LEVEL: ${SYNAPSE_LOG_LEVEL:-info}
    volumes:
      # Synapse provisions sibling containers via the host docker daemon.
      # This mount is unavoidable for the v0 architecture; the alternative is
      # rootless docker-in-docker, which is out of scope.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${SYNAPSE_PORT:-8080}:8080"
    networks:
      - synapse-network

  dashboard:
    build:
      context: ./dashboard
      # NEXT_PUBLIC_* vars are inlined into the JS bundle at *build*
      # time — Next.js doesn't read them at runtime. We MUST pass the
      # public URLs as build args, not just as runtime envs. The
      # `environment:` block below is kept as a hint for any code
      # path that still consults process.env at runtime, but the
      # browser-shipped JS comes from these build args.
      args:
        NEXT_PUBLIC_SYNAPSE_URL: ${PUBLIC_SYNAPSE_URL:-http://localhost:8080}
        # URL of the open-source Convex Dashboard (the data/functions/
        # logs UI for a single deployment). Synapse runs it as the
        # convex-dashboard service below; setup.sh wires this to
        # http://<vps-ip>:6791 (or https://<domain>:6791 with TLS).
        NEXT_PUBLIC_CONVEX_DASHBOARD_URL: ${PUBLIC_CONVEX_DASHBOARD_URL:-http://localhost:6791}
    image: synapse-dashboard:local
    container_name: synapse-dashboard
    restart: unless-stopped
    depends_on:
      - synapse
    environment:
      # Same values as the build args above; redundant for the
      # browser bundle but useful if any server-side render path
      # reads them at runtime.
      NEXT_PUBLIC_SYNAPSE_URL: ${PUBLIC_SYNAPSE_URL:-http://localhost:8080}
      NEXT_PUBLIC_CONVEX_DASHBOARD_URL: ${PUBLIC_CONVEX_DASHBOARD_URL:-http://localhost:6791}
    ports:
      - "${DASHBOARD_PORT:-6790}:3000"
    networks:
      - synapse-network

  # ----------------------------------------------------------------
  # Open-source Convex Dashboard. The "data / functions / logs /
  # schedules / files" UI for a single deployment — Convex publishes
  # this as a separate image on ghcr.io. The Synapse dashboard's
  # "Open dashboard" button targets it via NEXT_PUBLIC_CONVEX_DASHBOARD_URL
  # (baked into the dashboard build above). The image embeds a static
  # bundle that takes deploymentName / adminKey / deploymentUrl from
  # the URL hash and connects to the backend over the public network,
  # so this container needs no special networking — just a public
  # port. Each deployment's data flows: operator's browser →
  # convex-dashboard (static) → operator's browser → Synapse proxy
  # /d/<name>/* → convex backend container. The dashboard itself
  # never touches the data; it's just the UI shell.
  # ----------------------------------------------------------------

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    container_name: synapse-convex-dashboard
    restart: unless-stopped
    # NOTE: no `ports:` here — the upstream image emits anti-iframe
    # headers (X-Frame-Options + frame-ancestors CSP) that block
    # Synapse's /embed/<name> shell from rendering the dashboard.
    # The convex-dashboard-proxy sidecar below strips those headers
    # and is what operators actually hit on port 6791.
    expose:
      - "6791"
    networks:
      - synapse-network

  # ----------------------------------------------------------------
  # Tiny Caddy reverse-proxy in front of convex-dashboard. The
  # upstream image's X-Frame-Options + CSP frame-ancestors prevent
  # iframe embedding; this sidecar strips both so the Synapse
  # dashboard's `/embed/<name>` shell can iframe it and reply to
  # the postMessage handshake that auto-logs the dashboard. Strip
  # is safe because the /embed page itself sits behind Synapse auth.
  # ----------------------------------------------------------------

  convex-dashboard-proxy:
    image: caddy:2-alpine
    container_name: synapse-convex-dashboard-proxy
    restart: unless-stopped
    depends_on:
      - convex-dashboard
    ports:
      - "${CONVEX_DASHBOARD_PORT:-6791}:80"
    volumes:
      - ./installer/templates/convex-dashboard.caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - synapse-network

  # ----------------------------------------------------------------
  # HA test profile (v0.5+). Started with `docker compose --profile ha
  # up -d`; idle when the profile isn't selected. These services back
  # the SYNAPSE_HA_E2E real-backend test (see docs/HA_TESTING.md);
  # they are NOT what Synapse-managed deployments use as their backing
  # store in production — the operator points Synapse at managed
  # Postgres + S3 there.
  # ----------------------------------------------------------------

  backend-postgres:
    image: postgres:16-alpine
    container_name: synapse-backend-pg
    profiles: ["ha"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${HA_PG_USER:-convex}
      POSTGRES_PASSWORD: ${HA_PG_PASSWORD:-convex}
      POSTGRES_DB: postgres
    volumes:
      - synapse-backend-pgdata:/var/lib/postgresql/data
    ports:
      - "${HA_PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HA_PG_USER:-convex} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - synapse-network

  minio:
    image: minio/minio:latest
    container_name: synapse-minio
    profiles: ["ha"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${HA_S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${HA_S3_SECRET:-minioadmin}
    volumes:
      - synapse-minio-data:/data
    ports:
      - "${HA_S3_PORT:-9000}:9000"
      - "${HA_S3_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - synapse-network

  # ----------------------------------------------------------------
  # Caddy reverse-proxy profile (v0.6+). Activated by the auto-
  # installer when the host has no existing reverse proxy
  # (`./setup.sh` writes a Caddyfile from installer/templates/
  # caddy.standalone and brings this service up). Operators with
  # their own Caddy/nginx don't get a port-80 conflict because the
  # service is idle when the `caddy` profile isn't selected.
  # ----------------------------------------------------------------

  caddy:
    image: caddy:2-alpine
    container_name: synapse-caddy
    profiles: ["caddy"]
    restart: unless-stopped
    depends_on:
      - synapse
      - dashboard
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      # Operator's rendered Caddyfile (written by
      # installer/install/caddy.sh::write_standalone). Default path
      # matches setup.sh's /opt/synapse/Caddyfile convention; the
      # repo-root fallback keeps `docker compose --profile caddy up`
      # usable from a fresh clone without invoking setup.sh first.
      - ${SYNAPSE_CADDYFILE_PATH:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - synapse-caddy-data:/data
      - synapse-caddy-config:/config
    networks:
      - synapse-network

volumes:
  synapse-pgdata:
  synapse-backend-pgdata:
  synapse-minio-data:
  synapse-caddy-data:
  synapse-caddy-config:

networks:
  synapse-network:
    name: synapse-network
    driver: bridge
