# Local dev stack. Production deployments should override secrets.
# Run: docker compose up -d
#
# Services:
#   postgres   — metadata DB for synapse
#   synapse    — Go control-plane API (TODO: enable once Dockerfile lands)
#   dashboard  — Next.js dashboard (TODO: enable once dashboard fork lands)

name: synapse

services:
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
    volumes:
      - synapse-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse} -d ${POSTGRES_DB:-synapse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - synapse-network

