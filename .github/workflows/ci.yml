name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  synapse:
    name: synapse (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: synapse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: synapse/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  dashboard:
    name: dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SYNAPSE_URL: http://localhost:8080

  compose-build:
    name: docker-compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
        env:
          SYNAPSE_JWT_SECRET: dummy-jwt-secret-for-ci-builds-only-do-not-use-in-prod-x
