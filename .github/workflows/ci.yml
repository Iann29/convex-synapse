name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  synapse:
    name: synapse (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: synapse
          POSTGRES_PASSWORD: synapse
          POSTGRES_DB: synapse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U synapse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: synapse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: synapse/go.sum
      - run: go build ./...
      - run: go vet ./...
      - name: Test
        env:
          SYNAPSE_TEST_DB_URL: postgres://synapse:synapse@localhost:5432/synapse?sslmode=disable
        run: go test ./... -count=1

  dashboard:
    name: dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SYNAPSE_URL: http://localhost:8080

  compose-build:
    name: docker-compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
        env:
          SYNAPSE_JWT_SECRET: dummy-jwt-secret-for-ci-builds-only-do-not-use-in-prod-x

  installer:
    # v0.6 auto-installer — pure-bash helpers + bats unit tests.
    # We intentionally pin the bats and shellcheck Docker images
    # (rather than installing apt packages) so the same toolchain runs
    # locally and in CI; reproducing a CI failure on a developer
    # machine is `docker run ...` against the same digest.
    name: installer (bats + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable \
            -x \
            installer/lib/detect.sh \
            installer/lib/port.sh \
            installer/install/ui.sh \
            installer/install/preflight.sh \
            installer/install/secrets.sh \
            installer/install/caddy.sh \
            installer/install/compose.sh \
            installer/install/verify.sh \
            installer/test/helpers/load.bash
      - name: Build bats test image
        # Tiny image extending bats/bats:latest with jq + curl so the
        # tests that exercise verify.sh / compose.sh have the same
        # tools they'll have in production. Cached across runs.
        run: docker build -t synapse-bats installer/test/
      - name: bats
        run: docker run --rm -v "$PWD:/code" -w /code synapse-bats -r installer/test/

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: [synapse, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browser
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Bring up the stack
        env:
          SYNAPSE_JWT_SECRET: dummy-jwt-secret-for-ci-e2e-only-do-not-use-in-prod-xx
        run: docker compose up -d --build

      - name: Wait for synapse
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              echo "synapse healthy"
              exit 0
            fi
            sleep 2
          done
          echo "synapse never became healthy"
          docker compose logs
          exit 1

      - name: Wait for dashboard
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6790/login >/dev/null; then
              echo "dashboard healthy"
              exit 0
            fi
            sleep 2
          done
          echo "dashboard never became healthy"
          docker compose logs
          exit 1

      - name: Pre-pull convex-backend image (so first deployment is fast)
        run: docker pull ghcr.io/get-convex/convex-backend:latest

      - name: Run Playwright tests
        working-directory: dashboard
        run: npx playwright test --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:6790
          SYNAPSE_DB_URL: postgres://synapse:synapse@localhost:5432/synapse

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail 200
